name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  APP_NAME: linkchecker
  GO_VERSION_FILE: go.mod
  FRONTEND_REPO: https://gitea.kmux.cn/zhilv/linkcheck-fe.git
  FRONTEND_REF: main
  NODE_VERSION: "22"
  PNPM_VERSION: "9"

jobs:
  frontend:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Clone frontend source
        shell: bash
        env:
          FRONTEND_GIT_USERNAME: ${{ secrets.FRONTEND_GIT_USERNAME }}
          FRONTEND_GIT_TOKEN: ${{ secrets.FRONTEND_GIT_TOKEN }}
        run: |
          set -euo pipefail

          if [[ -z "${FRONTEND_GIT_USERNAME:-}" || -z "${FRONTEND_GIT_TOKEN:-}" ]]; then
            echo "Missing required secrets: FRONTEND_GIT_USERNAME / FRONTEND_GIT_TOKEN"
            exit 1
          fi

          rm -rf web/frontend
          auth_header="$(printf '%s:%s' "${FRONTEND_GIT_USERNAME}" "${FRONTEND_GIT_TOKEN}" | base64 | tr -d '\n')"
          git config --global http.version HTTP/1.1

          max_attempts=5
          for attempt in $(seq 1 "${max_attempts}"); do
            echo "Clone frontend attempt ${attempt}/${max_attempts}"

            if git -c http.extraHeader="Authorization: Basic ${auth_header}" \
              clone --depth=1 --branch "${FRONTEND_REF}" "${FRONTEND_REPO}" web/frontend; then
              echo "Frontend repository cloned successfully"
              break
            fi

            if [[ "${attempt}" -eq "${max_attempts}" ]]; then
              echo "Failed to clone frontend repository after ${max_attempts} attempts"
              exit 1
            fi

            rm -rf web/frontend
            sleep $((attempt * 5))
          done

      - name: Install frontend dependencies
        working-directory: web/frontend
        run: pnpm install --frozen-lockfile

      - name: Build frontend
        working-directory: web/frontend
        run: pnpm build

      - name: Prepare embedded assets
        shell: bash
        run: |
          set -euo pipefail
          rm -rf web/dist
          mkdir -p web/dist
          cp -R web/frontend/dist/. web/dist/

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist/*
          if-no-files-found: error

  test:
    runs-on: ubuntu-latest
    needs: frontend

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}

      - name: Run tests
        run: go test ./...

  build:
    runs-on: ubuntu-latest
    needs:
      - frontend
      - test
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
          - goos: linux
            goarch: arm64
          - goos: linux
            goarch: 386
          - goos: linux
            goarch: arm
            goarm: "7"
          - goos: windows
            goarch: amd64
            ext: .exe
          - goos: windows
            goarch: 386
            ext: .exe
          - goos: windows
            goarch: arm64
            ext: .exe
          - goos: darwin
            goarch: amd64
          - goos: darwin
            goarch: arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download frontend artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: web/dist

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: ${{ env.GO_VERSION_FILE }}

      - name: Build binary
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
          EXT: ${{ matrix.ext }}
          VERSION: ${{ github.ref_name }}
          GIT_COMMIT: ${{ github.sha }}
        run: |
          set -euo pipefail

          mkdir -p dist

          build_time="$(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          short_commit="${GIT_COMMIT::7}"
          output="${APP_NAME}_${VERSION}_${GOOS}_${GOARCH}${EXT}"

          ldflags="
          -s -w
          -X github.com/zhilv666/linkchecker/internal/conf.Version=${VERSION}
          -X github.com/zhilv666/linkchecker/internal/conf.BuildAt=${build_time}
          -X github.com/zhilv666/linkchecker/internal/conf.GitAuthor=github-actions[bot]
          -X github.com/zhilv666/linkchecker/internal/conf.GitEmail=41898282+github-actions[bot]@users.noreply.github.com
          -X github.com/zhilv666/linkchecker/internal/conf.GitCommit=${short_commit}
          "
          ldflags="$(echo "${ldflags}" | xargs)"

          export CGO_ENABLED=0
          go build -trimpath -ldflags "${ldflags}" -o "dist/${output}" .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*
          if-no-files-found: error

  release:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: "!web-dist"
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          find . -maxdepth 1 -type f -print0 | sort -z | xargs -0 sha256sum > checksums.txt

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*
