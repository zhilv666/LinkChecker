# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: '3'

vars:
  APP_NAME: linkchecker
  ENTRY: .
  BIN_DIR: bin
  TMP_DIR: tmp
  
  # --- 全局 Git 信息 (关键修复：放这里才能被所有子任务读取) ---
  GIT_AUTHOR: zhilv666
  GIT_EMAIL: zhilv666@qq.com
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"
  BUILD_TIME:
    sh: date '+%Y-%m-%d %H:%M:%S'
  GIT_COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo "unknown"

  # --- 全局注入参数 (关键修复) ---
  LDFLAGS: >-
    -s -w
    -X "github.com/zhilv666/linkchecker/internal/conf.Version={{.VERSION}}"
    -X "github.com/zhilv666/linkchecker/internal/conf.BuildAt={{.BUILD_TIME}}"
    -X "github.com/zhilv666/linkchecker/internal/conf.GitAuthor={{.GIT_AUTHOR}}"
    -X "github.com/zhilv666/linkchecker/internal/conf.GitEmail={{.GIT_EMAIL}}"
    -X "github.com/zhilv666/linkchecker/internal/conf.GitCommit={{.GIT_COMMIT}}"

tasks:
  default:
    desc: "默认: 执行构建"
    cmds:
      - task: build

  # --- 主构建入口 ---
  build:
    desc: "构建全平台程序并压缩"
    # 这里直接依赖具体的平台任务，既保留了独立任务，又实现了全量构建
    deps: [tidy, clean, build:windows, build:linux, build:macos]
    cmds:
      - echo "* 所有平台构建完成"
      - task: upx
    silent: true

  # --- 平台专属任务 (你要的都在这里) ---
  build:windows:
    desc: "构建 Windows (amd64, 386, arm64)"
    cmds:
      - task: build-target
        vars: {GOOS: windows, GOARCH: amd64}
      - task: build-target
        vars: {GOOS: windows, GOARCH: 386}
      - task: build-target
        vars: {GOOS: windows, GOARCH: arm64}
    silent: true

  build:linux:
    desc: "构建 Linux (amd64, arm64, 386, arm)"
    cmds:
      - task: build-target
        vars: {GOOS: linux, GOARCH: amd64}
      - task: build-target
        vars: {GOOS: linux, GOARCH: arm64}
      - task: build-target
        vars: {GOOS: linux, GOARCH: 386}
      - task: build-target
        vars: {GOOS: linux, GOARCH: arm}
    silent: true

  build:macos:
    desc: "构建 macOS (amd64, arm64)"
    cmds:
      - task: build-target
        vars: {GOOS: darwin, GOARCH: amd64}
      - task: build-target
        vars: {GOOS: darwin, GOARCH: arm64}
    silent: true


  # --- 核心构建逻辑 (复用) ---
  build-target:
    internal: true
    vars:
      EXT: '{{if eq .GOOS "windows"}}.exe{{end}}'
      OUTPUT: '{{.BIN_DIR}}/{{.APP_NAME}}_{{.GOOS}}_{{.GOARCH}}{{.EXT}}'
    cmds:
      - echo "  -> 正在构建 {{.GOOS}}/{{.GOARCH}}..."
      # 这里的 .LDFLAGS 会自动读取全局变量，修复了版本号丢失的问题
      - >-
        GOOS={{.GOOS}} GOARCH={{.GOARCH}} 
        go build -ldflags '{{.LDFLAGS}}' 
        -o {{.OUTPUT}} 
        {{.ENTRY}}
    silent: true

  # --- 压缩任务 (优化版) ---
  upx:
    desc: "压缩二进制文件 (智能跳过 macOS 和 Windows ARM)"
    cmds:
      - echo "* 开始压缩处理..."
      - |
        if ! command -v upx > /dev/null 2>&1; then
          echo "⚠️  未找到 UPX，跳过压缩。"
          exit 0
        fi

        for file in {{.BIN_DIR}}/*; do
          [ -f "$file" ] || continue
          
          if [[ "$file" == *"darwin"* ]]; then
             echo "* [SKIP] 跳过 macOS: $(basename $file)"
          elif [[ "$file" == *"windows_arm"* ]]; then
             echo "* [SKIP] 跳过 Win ARM: $(basename $file)"
          else
             echo "* [UPX]  压缩: $(basename $file)"
             upx --best --lzma "$file" >/dev/null 2>&1 || echo "  ⚠️ 失败: $file"
          fi
        done
    silent: true

  # --- 辅助任务 ---
  tidy:
    desc: "整理 Go 依赖"
    cmds: [go mod tidy]
    silent: true

  test:
    desc: "运行测试"
    cmds: [go test ./...]
    silent: true

  run:
    desc: "本地运行 (带日志记录)"
    deps: [tidy]
    vars: 
      LOG_FILE: "{{.TMP_DIR}}/{{now | date '2006-01-02_15-04-05'}}.log"
    cmds:
      - mkdir -p {{.TMP_DIR}}
      - echo "* 日志文件:- {{.LOG_FILE}}"
      - go run {{.ENTRY}} | tee -a {{.LOG_FILE}}
    silent: true

  debug:
    desc: "启动调试模式 (DLV)"
    deps: [tidy]
    interactive: true
    vars:
      DEBUG_BIN: "{{.TMP_DIR}}/{{.APP_NAME}}_debug.exe"
    cmds:
      - mkdir -p {{.TMP_DIR}}
      - echo "* 正在编译调试版本..."
      - go build -o {{.DEBUG_BIN}} -gcflags "all=-N -l" {{.ENTRY}}
      - echo "* 调试服务启动中... 监听端口 :2345"
      - dlv exec {{.DEBUG_BIN}} --headless --listen=:2345 --api-version=2 --accept-multiclient

  clean:
    desc: "清理构建产物"
    cmds:
      - echo "* 清理目录..."
      - rm -rf {{.BIN_DIR}} {{.TMP_DIR}}
    silent: true

  commit:
    desc: "提交代码到本地 (不推送) (用法: task commit -- '提交信息' [TAG=v1.0.0])"
    preconditions:
      - sh: '[ -n "{{.CLI_ARGS}}" ]'
        msg: "❌ 错误: 必须提供提交信息！\n   用法: task commit -- '修复了bug' [TAG=v1.0.1]"
    vars:
      MSG: '{{.CLI_ARGS}}'
    cmds:
      - echo "* 正在执行 Git Add ..."
      - git add .
      
      - echo "* 正在提交：{{.MSG}}"
      - git commit -m "{{.MSG}}"

      - echo "✅ 代码已提交到本地仓库"
      - task: tag
        vars: {TAG: "{{.TAG}}"}
    silent: true

  tag:
    desc: "创建本地标签 (不推送)"
    status:
      - '[ -z "{{.TAG}}" ]'
    cmds:
      - echo "* 发现新标签:- {{.TAG}}, 正在创建本地标签..."
      - git tag "{{.TAG}}"
      - echo "✅ 本地标签 {{.TAG}} 创建成功"
    silent: true