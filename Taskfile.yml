# yaml-language-server: $schema=https://taskfile.dev/schema.json
version: '3'

vars:
  APP_NAME: linkchecker
  ENTRY: . # 或者 ./cmd/server
  BIN_DIR: bin
  TMP_DIR: tmp
  
  GIT_AUTHOR: zhilv666
  GIT_EMAIL: zhilv666@qq.com


tasks:
  default:
    desc: "默认: 执行构建"
    cmds:
      - task: build

  # --- 构建任务 ---
  build:
    desc: "构建全平台程序并压缩"
    deps: [tidy, clean] # 先清理，再整理依赖，再构建
    silent: true
    vars:
      VERSION:
        sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"
      BUILD_TIME:
        sh: date -u '+%Y-%m-%d %H:%M:%S'
      GIT_COMMIT:
        sh: git rev-parse --short HEAD 2>/dev/null || echo "unknown"
      LDFLAGS: >-
        -s -w
        -X "github.com/zhilv666/linkchecker/internal/conf.Version={{.VERSION}}"
        -X "github.com/zhilv666/linkchecker/internal/conf.BuildAt={{.BUILD_TIME}}"
        -X "github.com/zhilv666/linkchecker/internal/conf.GitAuthor={{.GIT_AUTHOR}}"
        -X "github.com/zhilv666/linkchecker/internal/conf.GitEmail={{.GIT_EMAIL}}"
        -X "github.com/zhilv666/linkchecker/internal/conf.GitCommit={{.GIT_COMMIT}}"
    cmds:
      - echo "* 开始构建所有平台..."
      # Windows
      - task: build-target
        vars: {GOOS: windows, GOARCH: amd64}
      - task: build-target
        vars: {GOOS: windows, GOARCH: 386}
      - task: build-target
        vars: {GOOS: windows, GOARCH: arm64}
      # Linux
      - task: build-target
        vars: {GOOS: linux, GOARCH: amd64}
      - task: build-target
        vars: {GOOS: linux, GOARCH: arm64}
      - task: build-target
        vars: {GOOS: linux, GOARCH: 386}
      - task: build-target
        vars: {GOOS: linux, GOARCH: arm}
      # macOS
      - task: build-target
        vars: {GOOS: darwin, GOARCH: amd64}
      - task: build-target
        vars: {GOOS: darwin, GOARCH: arm64}
      
      - echo "* 构建阶段完成"
      - task: upx

  # 这是一个内部复用的通用构建任务
  build-target:
    internal: true # 标记为内部任务，不显示在 task --list 中
    silent: true
    vars:
      # 如果是 windows，后缀设为 .exe，否则为空
      EXT: '{{if eq .GOOS "windows"}}.exe{{end}}'
    cmds:
      - echo "  -> 正在构建 {{.GOOS}}/{{.GOARCH}}..."
      - >-
        GOOS={{.GOOS}} GOARCH={{.GOARCH}} 
        go build -ldflags '{{.LDFLAGS}}' 
        -o {{.BIN_DIR}}/{{.APP_NAME}}_{{.GOOS}}_{{.GOARCH}}{{.EXT}} 
        {{.ENTRY}}

  # --- 压缩任务 ---
  upx:
    desc: "压缩二进制文件 (智能跳过 macOS 和 Windows ARM)"
    cmds:
      - echo "* 开始压缩处理..."
      - |
        if command -v upx > /dev/null 2>&1; then
          for file in {{.BIN_DIR}}/*; do
            if [ -f "$file" ]; then
              case "$file" in
                *darwin*)       echo "* [SKIP] 跳过 macOS (防止签名损坏): $file" ;;
                *windows_arm*)  echo "* [SKIP] 跳过 Windows ARM (不支持): $file" ;;
                *)
                  echo "* [UPX]  压缩: $file"
                  upx --best --lzma "$file" >/dev/null 2>&1 || echo "  ⚠️ 失败: $file"
                  ;;
              esac
            fi
          done
        else
          echo "⚠️  未找到 UPX，跳过压缩。"
        fi
    silent: true

  # --- 辅助任务 ---
  tidy:
    desc: "整理 Go 依赖"
    cmds:
      - go mod tidy
    silent: true

  run:
    desc: "本地运行 (带日志记录)"
    deps: [tidy]
    vars: 
      LOG_TIME:
        sh: date -u '+%Y-%m-%d_%H-%M-%S'
    cmds:
      - mkdir -p {{.TMP_DIR}}
      - go run {{.ENTRY}} | tee -a {{.TMP_DIR}}/{{.LOG_TIME}}.log
    silent: true

  debug:
    desc: "启动调试模式 (DLV)"
    deps: [tidy]
    cmds:
      - mkdir -p {{.TMP_DIR}}
      - echo "* 正在编译调试版本..."
      - go build -o {{.TMP_DIR}}/{{.APP_NAME}}_debug.exe -gcflags "all=-N -l" {{.ENTRY}}
      - echo "* 调试服务启动中... 监听端口 :2345"
      # 注意：echo 必须放在 dlv 之前，因为 dlv 是阻塞的
      - dlv exec ./{{.TMP_DIR}}/{{.APP_NAME}}_debug.exe --headless --listen=:2345 --api-version=2 --accept-multiclient

  clean:
    desc: "清理构建产物"
    cmds:
      - echo "* 清理 {{.BIN_DIR}} 和 {{.TMP_DIR}}"
      # 使用 Taskfile 内置的 rm 命令，跨平台兼容性更好
      - rm -rf {{.BIN_DIR}}
      - rm -rf {{.TMP_DIR}}
    silent: true
    